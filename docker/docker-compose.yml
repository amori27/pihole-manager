version: "3.9"

services:
  pihole:
    image: pihole/pihole:latest
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8053:80/tcp"
    environment:
      TZ: "UTC"
      WEBPASSWORD: "${PIHOLE_PASSWORD:-admin}"
    volumes:
      - pihole_etc:/etc/pihole
      - pihole_dnsmasq:/etc/dnsmasq.d
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/admin/api.php?summary"]
      interval: 30s
      timeout: 10s
      retries: 3

  manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PIHOLE_HOST=pihole
      - PIHOLE_PORT=80
    depends_on:
      pihole:
        condition: service_healthy

volumes:
  pihole_etc:
  pihole_dnsmasq:
